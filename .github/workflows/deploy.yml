name: CI/CD — SignalForge

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Install test extras
        run: pip install ruff pytest pytest-json-report httpx

      - name: Lint
        run: ruff check .

      - name: Test (GCP Audit)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest agents/security_agent/test_gcp_audit.py -v --tb=short --json-report --json-report-file=gcp_audit_test_report.json

      - name: Test (AWS Audit)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest agents/security_agent/test_aws_audit.py -v --tb=short --json-report --json-report-file=aws_audit_test_report.json

      - name: Test (Orchestrator)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest agents/security_agent/test_orchestrator.py -v --tb=short --json-report --json-report-file=orchestrator_test_report.json

      - name: Test (Execution Wrapper)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest shared/test_execution_wrapper.py -v --tb=short

      - name: Generate Findings Report
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python .github/scripts/generate_findings_report.py

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            gcp_audit_test_report.json
            aws_audit_test_report.json
            orchestrator_test_report.json
            findings_report.json
          retention-days: 7

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --config fly.toml
