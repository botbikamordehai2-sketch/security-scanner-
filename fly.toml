app = "signalforge"
primary_region = "ams"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PORT = "8080"
  DEEPSEEK_API_KEY = "sk-03fc6db483eb49118bc5348963736939"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512